<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="急刹车">
<meta name="theme-color" content="#FDF8EC">
<title>夏天 · 暴风雨急刹车 | Summer · Storm Brake</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FDF8EC; --ink:#4A4440; --ele:#AEC6DD; --ele2:#95B3D2; --deep:#6f93bb;
    --bow:#F4A7BC; --amber:#F2A65A; --moss:#A9C48F; --moon:#F6D36B;
    --wobble:255px 18px 225px 18px/18px 225px 18px 255px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'ZCOOL KuaiLe',"PingFang SC","Microsoft YaHei",sans-serif;
    min-height:100vh; display:flex; justify-content:center;
    background-image:radial-gradient(#efe6cf 1.2px, transparent 1.2px); background-size:26px 26px;
  }
  .app{width:100%;max-width:430px;padding:26px 20px 40px;display:flex;flex-direction:column;align-items:center;position:relative}
  .lang{position:absolute;top:14px;right:16px;width:auto;font-size:14px;color:var(--ink);
    background:#fff;border:2.5px solid var(--ink);border-radius:14px 6px 12px 7px;padding:5px 12px;cursor:pointer;font-family:inherit}
  .screen{display:none;width:100%;flex-direction:column;align-items:center;animation:pop .35s ease}
  .screen.on{display:flex}
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  h1{font-size:25px;font-weight:400;text-align:center;line-height:1.4;margin:12px 0 6px}
  .sub{font-size:15px;color:#8a8272;text-align:center;line-height:1.7;margin-bottom:16px;max-width:335px}
  .say{font-size:16px;color:var(--ink);text-align:center;line-height:1.85;margin:2px 0 16px;max-width:325px;min-height:30px}
  .card{background:#fff;border:3px solid var(--ink);border-radius:var(--wobble);padding:18px 20px;width:100%;margin-bottom:14px}
  .sci{background:#fff;border:2.5px solid var(--ele2);border-radius:18px 7px 16px 8px;padding:13px 16px;width:100%;margin-bottom:14px;font-size:13.5px;line-height:1.75;color:#5f6b7a;text-align:left}
  .sci b{color:var(--deep)}
  button{font-family:inherit;color:var(--ink);cursor:pointer;border:3px solid var(--ink);border-radius:var(--wobble);
    background:#fff;font-size:18px;padding:15px 18px;width:100%;margin-bottom:11px;transition:transform .1s;line-height:1.5}
  button:active{transform:scale(.97) rotate(-.5deg)}
  .big{background:var(--bow);font-size:21px;padding:19px}
  .soft{background:var(--ele)} .ghost{border-style:dashed;background:transparent;font-size:15px;color:#8a8272}
  .moss{background:var(--moss)} .moon{background:var(--moon)} .bodybtn{background:#fff}
  .act{background:#fff;text-align:left;font-size:16px;line-height:1.5}
  .counter{font-size:14px;color:#8a8272;margin-top:4px;text-align:center;line-height:1.7}
  .waveBox{width:100%;height:150px;border:3px solid var(--ink);border-radius:24px 9px 22px 11px;overflow:hidden;position:relative;background:#eef5fb;margin:10px 0 4px}
  #breathRing{position:absolute;left:50%;top:44%;width:64px;height:64px;margin:-32px 0 0 -32px;border-radius:50%;
    border:3px solid rgba(255,255,255,.9);box-shadow:0 0 0 6px rgba(255,255,255,.25);z-index:2;pointer-events:none;
    transition:transform 1s linear, opacity 1s linear;opacity:.85}
  #breathWord{position:absolute;left:0;right:0;top:44%;margin-top:-11px;text-align:center;color:#fff;font-size:17px;
    letter-spacing:3px;z-index:3;pointer-events:none;text-shadow:0 1px 3px rgba(90,110,140,.5);transition:opacity .6s}
  .clock{font-size:40px;text-align:center;letter-spacing:2px;margin:6px 0 0}
  .phase{font-size:13px;color:#a89f8c;text-align:center;margin-bottom:6px;min-height:18px}
  .stamp{font-size:15px;line-height:1.95}
  .foot{font-size:12.5px;color:#a89f8c;text-align:center;line-height:1.7;margin-top:20px;max-width:335px}
  .trophy{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0 12px;max-width:300px}
  .trophy span{font-size:22px;line-height:1}
  .moodRow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:4px 0 12px}
  .moodRow button{width:auto;flex:none;padding:10px 15px;margin:0;font-size:18px;border-radius:14px 7px 12px 8px}
  .moodRow button.sel{background:var(--moon)}
  .deltaLine{font-size:14.5px;color:#6f93bb;text-align:center;min-height:22px;margin-bottom:10px;line-height:1.6}
  .sighWrap{width:100%;height:170px;display:flex;align-items:center;justify-content:center;margin:6px 0 2px}
  #sighRing{width:112px;height:112px;border-radius:50%;border:3px solid var(--ele2);display:flex;align-items:center;justify-content:center;
    color:var(--deep);font-size:15px;letter-spacing:2px;transition:transform .9s linear;text-align:center;line-height:1.4}
  .planRow button.sel{background:var(--moon)}
  @media (prefers-reduced-motion:reduce){.screen{animation:none}}
</style>
</head>
<body>
<div class="app">
  <button class="lang" id="langBtn" onclick="flip()">EN</button>

  <svg id="ele" width="150" height="132" viewBox="0 -14 300 274" role="img" aria-label="小象夏天 Summer the Elephant">
    <defs><filter id="cr" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/></filter></defs>
    <g filter="url(#cr)" stroke-linecap="round" stroke-linejoin="round">
      <text id="eleName" x="150" y="26" text-anchor="middle" font-size="30" fill="#e0894a" transform="rotate(-3 150 26)" style="font-family:'ZCOOL KuaiLe','PingFang SC',sans-serif">夏天</text>
      <path d="M150 52 q 0 -20 12 -26" fill="none" stroke="#5b544f" stroke-width="5"/>
      <path d="M162 26 l 16 -9 -2 17 z M162 26 l -15 10 16 6 z" fill="#F4A7BC" stroke="#5b544f" stroke-width="4"/>
      <ellipse cx="76" cy="112" rx="34" ry="42" fill="#95B3D2" fill-opacity=".85" stroke="#5b544f" stroke-width="6"/>
      <ellipse cx="224" cy="112" rx="34" ry="42" fill="#95B3D2" fill-opacity=".85" stroke="#5b544f" stroke-width="6"/>
      <ellipse cx="150" cy="198" rx="74" ry="46" fill="#AEC6DD" fill-opacity=".9" stroke="#5b544f" stroke-width="6"/>
      <rect x="112" y="222" width="26" height="28" rx="10" fill="#AEC6DD" fill-opacity=".9" stroke="#5b544f" stroke-width="5"/>
      <rect x="162" y="222" width="26" height="28" rx="10" fill="#AEC6DD" fill-opacity=".9" stroke="#5b544f" stroke-width="5"/>
      <circle cx="150" cy="118" r="68" fill="#AEC6DD" fill-opacity=".95" stroke="#5b544f" stroke-width="6"/>
      <path d="M150 150 q -3 30 2 48 q 3 10 13 6" fill="none" stroke="#5b544f" stroke-width="19"/>
      <path d="M150 150 q -3 30 2 48 q 3 10 13 6" fill="none" stroke="#AEC6DD" stroke-width="11"/>
      <path id="eye" d="M108 110 q 9 9 18 0 M174 110 q 9 9 18 0" fill="none" stroke="#5b544f" stroke-width="5.5"/>
      <ellipse cx="100" cy="136" rx="11" ry="7" fill="#F4A7BC" opacity=".8"/>
      <ellipse cx="200" cy="136" rx="11" ry="7" fill="#F4A7BC" opacity=".8"/>
      <g transform="translate(180 188) rotate(-5)">
        <rect x="0" y="0" width="40" height="22" rx="4" fill="#FFFDF7" stroke="#5b544f" stroke-width="4"/>
        <rect x="40" y="7" width="5" height="8" rx="2" fill="#5b544f"/>
        <rect x="4" y="4" width="8" height="14" rx="2" fill="#F2A65A"/></g>
    </g>
  </svg>

  <div class="screen on" id="s-home">
    <h1 data-i="t_home"></h1>
    <p class="sub" data-i="s_home"></p>
    <button class="big" onclick="go('s-feel')" data-i="b_big"></button>
    <div class="trophy" id="trophy"></div>
    <p class="counter" id="count"></p>
    <p class="counter" id="planLine" style="color:#6f93bb"></p>
    <p class="foot" data-i="foot"></p>
  </div>

  <div class="screen" id="s-feel">
    <h1 data-i="t_feel"></h1>
    <p class="say" data-i="say_feel"></p>
    <button class="soft" onclick="setEmo('tired')" data-i="f1"></button>
    <button class="soft" onclick="setEmo('stress')" data-i="f2"></button>
    <button class="soft" onclick="setEmo('empty')" data-i="f3"></button>
    <button class="soft" onclick="setEmo('lonely')" data-i="f4"></button>
    <button class="moon" onclick="go('s-hungry')" data-i="f5"></button>
    <button class="ghost" onclick="go('s-home')" data-i="back"></button>
  </div>

  <!-- 情绪解读：告诉你此刻大脑在发生什么 -->
  <div class="screen" id="s-decode">
    <h1 id="decodeTitle"></h1>
    <p class="say" id="decodeSay"></p>
    <div class="sci" id="decodeSci"></div>
    <button class="moss" onclick="go('s-rate1')" id="decodeBtn"></button>
    <button class="ghost" onclick="go('s-feel')" data-i="back"></button>
  </div>

  <!-- 冲浪前:给冲动打个分(CBT证据生成) -->
  <div class="screen" id="s-rate1">
    <h1 data-i="t_rate1"></h1>
    <p class="say" data-i="say_rate1"></p>
    <div class="moodRow" id="rate1Row"></div>
    <button class="moss" id="rate1Btn" onclick="go('s-wave')" disabled style="opacity:.4" data-i="b_rate1"></button>
    <button class="ghost" onclick="go('s-sigh')" data-i="b_sigh"></button>
  </div>

  <!-- 生理叹息:太猛时的30秒急救(斯坦福验证的最快呼吸法) -->
  <div class="screen" id="s-sigh">
    <h1 data-i="t_sigh"></h1>
    <p class="bcount" id="sighCount" style="font-size:13px;color:#a89f8c;text-align:center;margin-bottom:6px"></p>
    <div class="sighWrap"><div id="sighRing"><span id="sighWord"></span></div></div>
    <p class="say" data-i="say_sigh"></p>
    <button class="ghost" onclick="skipSigh()" data-i="b_skipsigh"></button>
  </div>

  <div class="screen" id="s-wave">
    <h1 data-i="t_wave"></h1>
    <div class="waveBox">
      <svg id="seaSvg" width="100%" height="150" viewBox="0 0 400 150" preserveAspectRatio="none" aria-hidden="true">
        <path id="sea1" fill="#95B3D2" fill-opacity="0.5" d=""></path>
        <path id="sea2" fill="#AEC6DD" fill-opacity="0.9" d=""></path>
      </svg>
      <div id="breathRing"></div>
      <div id="breathWord"></div>
    </div>
    <div class="clock" id="clock">3:00</div>
    <div class="phase" id="phase"></div>
    <p class="say" id="waveSay"></p>
    <button class="ghost" onclick="endWave()" data-i="g_wave"></button>
  </div>

  <div class="screen" id="s-check">
    <h1 data-i="t_check"></h1>
    <p class="say" id="rate2Say"></p>
    <div class="moodRow" id="rate2Row"></div>
    <div class="deltaLine" id="deltaLine"></div>
    <button class="moss" onclick="go('s-act')" data-i="c1"></button>
    <button class="soft" onclick="go('s-wave')" data-i="c2"></button>
    <button class="moon" onclick="go('s-eat')" data-i="c3"></button>
  </div>

  <!-- 按情绪给不同的替代行动 -->
  <div class="screen" id="s-act">
    <h1 data-i="t_act"></h1>
    <p class="say" id="actSay"></p>
    <div id="actList"></div>
    <button class="moss" onclick="win()" data-i="b_act"></button>
  </div>

  <div class="screen" id="s-hungry">
    <h1 data-i="t_hungry"></h1>
    <p class="sub" data-i="s_hungry"></p>
    <button class="moss" onclick="go('s-home')" data-i="b_hungry"></button>
  </div>

  <div class="screen" id="s-eat">
    <h1 data-i="t_eat"></h1>
    <p class="sub" data-i="s_eat"></p>
    <button class="moss" onclick="go('s-home')" data-i="b_eat"></button>
  </div>

  <div class="screen" id="s-win">
    <h1 data-i="t_win"></h1>
    <div class="deltaLine" id="deltaStamp"></div>
    <div class="card stamp" data-i="stamp"></div>
    <p class="say" data-i="say_win"></p>
    <p class="say" data-i="t_plan" style="margin-top:4px"></p>
    <div class="planRow" style="width:100%">
      <button class="soft" onclick="pickPlan(0,this)" data-i="p1"></button>
      <button class="soft" onclick="pickPlan(1,this)" data-i="p2"></button>
      <button class="soft" onclick="pickPlan(2,this)" data-i="p3"></button>
    </div>
    <p class="sub" data-i="s_win"></p>
    <button class="soft" onclick="go('s-home')" data-i="b_home"></button>
  </div>
</div>
<script>

  // 每种情绪：解读 + 神经科学 + 退浪陪伴话 + 替代行动。全部不同。
  var EMO={
    tired:{
      zh:{title:'原来是"累"在喊饿',

    empty:{

        sci:'<b>发生了什么：</b>低刺激状态下，大脑奖赏回路缺多巴胺，食物成了最快的奖赏来源。重复几次，"无聊→吃"就会连成自动的神经习惯。<b>所以：</b>它要的是"新鲜刺激"，不是热量——换一种刺激就能骗过它。',

        sci:'<b>发生了什么：</b>孤独会激活大脑奖赏网络里和成瘾几乎重叠的区域（伏隔核、腹侧纹状体），产生对糖和甜食的强烈渴望——本质是身体在渴求"重新连接"。<b>所以：</b>真正能填的是一点点连接感，哪怕很小。',
        wave:['你不是一个人在这儿，我陪着你。','孤独的痛是真的，但食物填不上那个形状的洞。','把手放在胸口，感觉一下自己还在，稳稳的。','你正在被自己好好对待——这本身就是一种连接。','快退了…… 委屈的浪退下去，会松开一点。'],
        actSay:'你缺的是一点连接感，那就给自己一点——',

      en:{title:'It is loneliness, mistaken for hunger',
        say:'When you are lonely, the brain lights up the same region as "wanting to be held." It craves connection — food is just easier to reach, so it stands in.',
        sci:'<b>What is happening:</b> loneliness activates reward regions that overlap almost exactly with addiction (nucleus accumbens, ventral striatum), driving strong cravings for sugar — really a body aching to reconnect. <b>So:</b> what fills it is a little connection, however small.',
        wave:['You are not alone here — I am with you.','The ache of loneliness is real, but food cannot fill that shape.','Hand on your chest — feel yourself still here, steady.','You are being cared for right now — that itself is connection.','Almost gone… as the hurt-wave falls, it loosens a little.'],
        actSay:'What you lack is a little connection — give yourself some:',

  var lang='zh',emo='tired',surfed=0,timer=null,left=180,DUR=180,seaStart=0,seaRAF=null;
  var urge1=0,urge2=0,plan=-1,sighRAF=null,sighStart=0;
  function applyLang(){
    document.querySelectorAll('[data-i]').forEach(function(el){el.innerHTML=T[lang][el.getAttribute('data-i')]});
    document.getElementById('langBtn').textContent=lang==='zh'?'EN':'中';
    var nm=document.getElementById('eleName');if(nm)nm.textContent=lang==='zh'?'夏天':'Summer';
    paint();
    paintPlan();
  }
  function flip(){lang=lang==='zh'?'en':'zh';try{if(window.storage)window.storage.set('lang',lang)}catch(e){}applyLang();if(document.getElementById('s-decode').classList.contains('on'))fillDecode();if(document.getElementById('s-act').classList.contains('on'))fillAct();}
  function fmt(s){return Math.floor(s/60)+":"+("0"+s%60).slice(-2)}
  function setEmo(e){emo=e;fillDecode();go('s-decode');}
  function fillDecode(){
    var d=EMO[emo][lang];
    document.getElementById('decodeTitle').textContent=d.title;
    document.getElementById('decodeSay').innerHTML=d.say;
    document.getElementById('decodeSci').innerHTML=d.sci;
    document.getElementById('decodeBtn').textContent=T[lang].decBtn;
  }
  function fillAct(){
    var d=EMO[emo][lang];
    document.getElementById('actSay').innerHTML=d.actSay;
    var box=document.getElementById('actList');box.innerHTML='';
    d.acts.forEach(function(a){var b=document.createElement('div');b.className='act card';b.style.marginBottom='11px';b.style.padding='14px 16px';b.textContent='· '+a;box.appendChild(b);});
  }
  function go(id){
    document.querySelectorAll('.screen').forEach(function(x){x.classList.remove('on')});
    document.getElementById(id).classList.add('on');
    if(id==='s-wave')startWave();else stopWave();
    if(id==='s-sigh')startSigh();else stopSigh();
    if(id==='s-rate1')buildRate1();
    if(id==='s-check')buildRate2();
    if(id==='s-act')fillAct();
    var eye=document.getElementById('eye');
    if(id==='s-win'||id==='s-hungry'||id==='s-eat'||id==='s-act'){eye.setAttribute('d','M108 114 q 9 -9 18 0 M174 114 q 9 -9 18 0')}
    else{eye.setAttribute('d','M108 110 q 9 9 18 0 M174 110 q 9 9 18 0')}
  }
  // 海浪节奏 = 呼吸节奏。一次完整呼吸 10 秒：吸4 · 顶部停1 · 呼5。
  // 长呼气激活副交感神经（迷走神经"刹车"）。海面缓升缓降，人不自觉跟着呼吸。
  var CYCLE=10000, INH=4000, HOLD=1000; // ms
  function breathePhase(t){
    var m=t%CYCLE;
    if(m<INH){return {k:'in', r:m/INH};}                 // 吸：0→1
    if(m<INH+HOLD){return {k:'hold', r:1};}              // 停
    return {k:'out', r:1-(m-INH-HOLD)/(CYCLE-INH-HOLD)};  // 呼：1→0
  }
  // 平滑的正弦缓动，去掉快抖的高频项，让浪很"顺"
  function seaPath(phase,amp,base){
    var pts=[], W=400;
    for(var x=0;x<=W;x+=8){
      var y=base + Math.sin((x/W*2.1)+phase)*amp + Math.sin((x/W*4.3)+phase*1.3)*amp*0.18;
      pts.push(x+' '+y.toFixed(1));
    }
    return 'M0 150 L0 '+base.toFixed(1)+' L'+pts.join(' L')+' L400 150 Z';
  }
  function drawSea(ts){
    if(!seaStart)seaStart=ts;
    var t=ts-seaStart;
    var prog=(DUR-left)/DUR;
    // 冲动整体包络：前1/3涨到峰、之后缓缓退（决定水位高低与浪的大小）
    var env = prog<0.33 ? (0.4+prog*1.8) : Math.max(0.2,(0.95-(prog-0.33)*0.85));
    // 呼吸：吸→水位升、浪变大；呼→水位落、浪变平
    var b=breathePhase(t);
    var ease = b.k==='in' ? (0.5-0.5*Math.cos(b.r*Math.PI)) : b.k==='hold' ? 1 : (0.5-0.5*Math.cos(b.r*Math.PI));
    var waterLevel = 96 - env*30 - ease*14;      // 越吸越高（y越小）
    var amp = (7+env*13) * (0.55+ease*0.6);      // 吸气浪大、呼气浪平
    var drift = t/1000*0.42;                     // 极慢横向漂移
    var p1=document.getElementById('sea1'), p2=document.getElementById('sea2');
    if(p1)p1.setAttribute('d',seaPath(drift,amp*1.15,waterLevel-7));
    if(p2)p2.setAttribute('d',seaPath(drift+1.1,amp,waterLevel+6));
    // 退潮后颜色变平静（深蓝→浅蓝）
    var calm=Math.min(1,prog*1.2);
    if(p2)p2.setAttribute('fill', calm>0.5?'#B9D2E6':'#AEC6DD');
    // 呼吸光环 + 文字
    var ring=document.getElementById('breathRing'), word=document.getElementById('breathWord');
    if(ring){var sc=0.7+ease*0.85; ring.style.transform='scale('+sc.toFixed(3)+')'; ring.style.opacity=(0.4+ease*0.5).toFixed(2);}
    if(word){word.textContent = b.k==='in'?T[lang].bIn : b.k==='hold'?T[lang].bHold : T[lang].bOut;}
    seaRAF=requestAnimationFrame(drawSea);
  }
  function startWave(){stopWave();left=DUR;seaStart=0;tick();timer=setInterval(tick,1000);seaRAF=requestAnimationFrame(drawSea);}
  function stopWave(){if(timer){clearInterval(timer);timer=null}if(seaRAF){cancelAnimationFrame(seaRAF);seaRAF=null}}
  function tick(){
    document.getElementById('clock').textContent=fmt(left);
    var done=DUR-left, prog=done/DUR;
    var ph=document.getElementById('phase');
    if(prog<0.30){ph.textContent=T[lang].phRise;}
    else if(prog<0.42){ph.textContent=T[lang].phPeak;}
    else{ph.textContent=T[lang].phFall;}
    var idx=Math.min(4,Math.floor(prog*5));
    document.getElementById('waveSay').innerHTML=EMO[emo][lang].wave[idx];
    if(left<=0){stopWave();go('s-check');return}
    left--;
  }
  function endWave(){stopWave();go('s-check')}
  function buildRow(rowId,btnCb){
    var row=document.getElementById(rowId);row.innerHTML='';
    for(var i=1;i<=10;i++){(function(v){var b=document.createElement('button');b.textContent=v;
      b.onclick=function(){[].forEach.call(row.children,function(c){c.classList.remove('sel')});b.classList.add('sel');btnCb(v);};
      row.appendChild(b);})(i);}
  }
  function buildRate1(){
    urge1=0;urge2=0;
    buildRow('rate1Row',function(v){urge1=v;var b=document.getElementById('rate1Btn');b.disabled=false;b.style.opacity=1;});
    var b=document.getElementById('rate1Btn');b.disabled=true;b.style.opacity=.4;
  }
  function buildRate2(){
    document.getElementById('rate2Say').innerHTML = urge1?T[lang].say_rate2(urge1):T[lang].say_rate2b;
    document.getElementById('deltaLine').textContent='';
    buildRow('rate2Row',function(v){
      urge2=v;
      var d=document.getElementById('deltaLine');
      if(urge1&&v<urge1){d.textContent=T[lang].deltaDown(urge1,v);}
      else{d.textContent=T[lang].deltaFlat;}
    });
  }
  var SIGH_T=[2500,1200,6300], SIGH_N=3;
  function startSigh(){stopSigh();sighStart=0;sighRAF=requestAnimationFrame(sighLoop);}
  function stopSigh(){if(sighRAF){cancelAnimationFrame(sighRAF);sighRAF=null}}
  function sighLoop(ts){
    if(!sighStart)sighStart=ts;var t=ts-sighStart;
    var CY=SIGH_T[0]+SIGH_T[1]+SIGH_T[2];
    var cyc=Math.floor(t/CY);
    document.getElementById('sighCount').textContent=T[lang].sighN(Math.min(cyc+1,SIGH_N),SIGH_N);
    if(cyc>=SIGH_N){stopSigh();go('s-wave');return;}
    var m=t%CY,ring=document.getElementById('sighRing'),word=document.getElementById('sighWord'),sc,w;
    if(m<SIGH_T[0]){sc=0.75+0.45*(m/SIGH_T[0]);w=T[lang].sIn;}
    else if(m<SIGH_T[0]+SIGH_T[1]){sc=1.2+0.18*((m-SIGH_T[0])/SIGH_T[1]);w=T[lang].sIn2;}
    else{var r=(m-SIGH_T[0]-SIGH_T[1])/SIGH_T[2];sc=1.38-0.63*r;w=T[lang].sOut;}
    ring.style.transform='scale('+sc.toFixed(3)+')';word.textContent=w;
    sighRAF=requestAnimationFrame(sighLoop);
  }
  function skipSigh(){stopSigh();go('s-wave');}
  function pickPlan(i,btn){
    plan=i;
    var pr=btn.parentNode;[].forEach.call(pr.children,function(c){c.classList.remove('sel')});btn.classList.add('sel');
    try{if(window.storage)window.storage.set('binge-plan',String(i))}catch(e){}
    paintPlan();
  }
  function paintPlan(){
    var el=document.getElementById('planLine');if(!el)return;
    el.textContent = plan>=0 ? (T[lang].planPrefix+'\u300c'+T[lang]['p'+(plan+1)]+'\u300d') : '';
  }
  function win(){
    surfed++;save();paint();
    var d=document.getElementById('deltaStamp');
    d.textContent=(urge1&&urge2)?T[lang].urgeStamp(urge1,urge2):'';
    go('s-win');
  }
  function paint(){
    var c=document.getElementById('count'); if(c)c.textContent=surfed>0?(lang==='zh'?('你已经陪 '+surfed+' 场暴风雨，安全地过了境'):('You have weathered '+surfed+' storms, safely')):'';
    var tr=document.getElementById('trophy'); if(tr){tr.innerHTML=''; for(var i=0;i<Math.min(surfed,24);i++){var s=document.createElement('span');s.textContent='🌊';tr.appendChild(s);}}
  }
  function save(){try{if(window.storage)window.storage.set('binge-surfed',String(surfed))}catch(e){}}
  (function(){applyLang();try{if(window.storage){
    window.storage.get('binge-surfed').then(function(r){if(r&&r.value){surfed=parseInt(r.value)||0;paint()}}).catch(function(){});
    window.storage.get('lang').then(function(r){if(r&&r.value&&T[r.value]){lang=r.value;applyLang()}}).catch(function(){});
    window.storage.get('binge-plan').then(function(r){if(r&&r.value!==undefined&&r.value!==null){plan=parseInt(r.value);if(isNaN(plan))plan=-1;paintPlan()}}).catch(function(){});
  }}catch(e){}})();
</script>
